<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gestión Deportiva - Melide</title>
    <style>
        :root {
            --melide-primary: #005696;
            --melide-dark: #003d6b;
            --melide-accent: #0ea5e9;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg-gradient); 
            color: white; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; 
        }

        header { 
            background: rgba(0, 86, 150, 0.9); 
            backdrop-filter: blur(10px);
            color: white; 
            padding: 1rem; 
            text-align: center; 
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-nav-btns {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 10px;
        }

        .btn-mini {
            background: rgba(255,255,255,0.25);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            min-height: 44px;
        }

        .container { 
            padding: 15px; 
            height: calc(100vh - 75px); 
            overflow-y: auto; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .screen { display: none; height: 100%; flex-direction: column; }
        .screen.active { display: flex; animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .welcome-card { 
            background: var(--card-bg); padding: 30px; border-radius: 24px; color: var(--text-main);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); width: 95%; max-width: 450px; margin: auto;
        }

        .grid-menu { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            padding-bottom: 20px;
        }

        .menu-card { 
            background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2);
            padding: 25px 10px; border-radius: 20px; text-align: center; transition: 0.3s; cursor: pointer;
        }
        .menu-card:active { transform: scale(0.95); background: var(--melide-accent); }
        .menu-card h3 { margin: 10px 0 0; font-size: 1rem; }

        .btn-logout {
            background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 15px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; max-width: 300px;
            margin: 20px auto; display: block;
        }

        .search-input { 
            width: 100%; padding: 14px; border-radius: 12px; border: none; 
            background: rgba(255,255,255,0.95); color: var(--text-main); font-size: 1rem;
            margin-bottom: 15px;
        }

        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; padding-bottom: 30px; }
        
        .item-card { 
            background: var(--card-bg); border-radius: 15px; color: var(--text-main);
            border-left: 6px solid var(--melide-primary);
            position: relative; padding: 18px; cursor: pointer;
        }

        .item-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.1rem; }

        .btn-act-group { display: flex; gap: 8px; margin-top: 12px; }
        .btn-act { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; font-size: 0.8rem; }
        .btn-asis { background: #0ea5e9; }
        .btn-wapp { background: #25d366; }

        .btn-del-item {
            position: absolute; right: 8px; top: 8px; background: #fee2e2; color: #ef4444;
            border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .btn-add-section {
            background: var(--melide-accent); color: white; border: none; padding: 16px;
            border-radius: 12px; font-weight: bold; margin-bottom: 15px; cursor: pointer; width: 100%; font-size: 1rem;
        }

        .sub-view-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); z-index: 1000; display: none; align-items: center; justify-content: center;
            padding: 15px;
        }
        .sub-view-overlay.active { display: flex; }

        .modal-content {
            background: white; width: 100%; max-width: 600px; max-height: 90vh; 
            border-radius: 24px; color: var(--text-main); padding: 25px; overflow-y: auto;
        }

        .asistencia-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #f1f5f9; margin-bottom: 8px; cursor: pointer; }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--melide-primary); color: white; font-weight: bold; margin-top: 15px; font-size: 1rem; }
        select, textarea, input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #cbd5e1; font-family: inherit; margin-top: 5px; box-sizing: border-box; font-size: 1rem; }
        
        label { display: block; margin-top: 12px; font-size: 0.85rem; font-weight: bold; color: #64748b; }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; background: white; border-radius: 10px; overflow: hidden; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; }
        th { background: #f1f5f9; color: var(--melide-primary); }
        
        .sched-item { position: relative; font-size: 0.7rem; padding: 5px; border-radius: 5px; background: #e0f2fe; color: #0369a1; border-left: 3px solid var(--melide-accent); margin-bottom: 3px; }
        .btn-rm-sched { position: absolute; top: 0; right: 0; background: #ef4444; color: white; border: none; border-radius: 0 4px 0 4px; font-size: 0.6rem; padding: 2px 4px; cursor: pointer; }

        .status-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; margin-left: 5px; text-transform: uppercase; font-weight: bold; }
        .status-admitido { background: #dcfce7; color: #166534; }
        .status-espera { background: #fef9c3; color: #854d0e; }
        .status-baja { background: #fee2e2; color: #991b1b; }

        @media (max-width: 600px) {
            header h1 { font-size: 1rem; text-align: left; padding-left: 5px; }
            .top-nav-btns { gap: 5px; right: 5px; }
            .btn-mini { padding: 8px 10px; min-width: 38px; min-height: 38px; font-size: 1rem; }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    databaseURL: "https://escolas-melide-default-rtdb.europe-west1.firebasedatabase.app/"
  };
  firebase.initializeApp(firebaseConfig);
  const dbRef = firebase.database().ref('melide_db');
</script>
</head>
<body>

<header>
    <h1 style="margin:0; letter-spacing: 1px;">CONCELLO DE <strong>MELIDE</strong></h1>
    <div class="top-nav-btns" id="top-nav">
        <button class="btn-mini" id="btn-back-header" onclick="goBack()" style="display:none;" title="Volver">←</button>
        <button class="btn-mini" onclick="toggleFS()" title="Pantalla Completa">⛶</button>
    </div>
</header>

<div class="container" id="main-container">
    <section id="scr-inicio" class="screen active">
        <div class="welcome-card">
            <h2 style="margin-top:0; color: var(--melide-primary); text-align: center;">Acceso Gestión</h2>
            <label>Tipo de Usuario</label>
            <select id="user-role" onchange="toggleMonitorLogin(this.value)">
                <option value="tecnico">Técnico Municipal</option>
                <option value="monitor">Monitor / Profesor</option>
            </select>
            <div id="login-monitor-area" style="display:none;">
                <label>Seleccionar Monitor</label>
                <select id="id-monitor-login"></select>
            </div>
            <button class="btn" onclick="login()">ENTRAR</button>
        </div>
    </section>

    <section id="scr-dash" class="screen">
        <div class="grid-menu" id="menu-container"></div>
        <button class="btn-logout" onclick="logout()">CERRAR SESIÓN</button>
    </section>

    <section id="scr-edit" class="screen">
        <div class="search-container" id="search-box-area">
            <input type="text" id="global-search" class="search-input" placeholder="🔍 Buscar..." oninput="filterCurrentData()">
        </div>
        <div id="section-actions"></div>
        <div id="data-container" class="data-grid"></div>
    </section>
</div>

<div id="modal-overlay" class="sub-view-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button style="float:right; border:none; background:none; font-size:1.8rem;" onclick="closeModal()">✕</button>
        <div id="modal-body"></div>
    </div>
</div>

<script>
    // 1. CARGA DE DATOS
    const STORAGE_KEY = 'melide_db_v1';
    let savedData = localStorage.getItem(STORAGE_KEY);
    let db;

    try {
        db = savedData ? JSON.parse(savedData) : {
            Alumnos: [], Monitores: [], Actividades: [], Aulas: [
                { nome: 'PABELLÓN MUNICIPAL', espacios: ['PISTA CENTRAL', 'SALA 1', 'SALA 2'] },
                { nome: 'PISCINA MUNICIPAL', espacios: ['VASO GRANDE', 'VASO PEQUEÑO', 'SALA FITNESS'] },
                { nome: 'PARROQUIAS', espacios: [] }
            ]
        };
    } catch (e) {
        db = { Alumnos: [], Monitores: [], Actividades: [], Aulas: [] };
    }

    // 2. FUNCIÓN GUARDAR
    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
    }

    // 3. VARIABLES DE INTERFAZ
    let currentSection = 'Inicio';
    const diasSemana = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes"];

    // 4. FUNCIÓN LOGIN (Asegúrate de que empiece así)
    function login() {
        // ... aquí va el código de tu función login ...
    }

function login() {
    userRole = document.getElementById('user-role').value;
    const monitorElem = document.getElementById('id-monitor-login');
    monitorActivo = (userRole === 'monitor' && monitorElem) ? monitorElem.value : 'todos';

    const menu = document.getElementById('menu-container');
    if (!menu) return;
    menu.innerHTML = '';

    let tabs = [
        {id: 'Monitores', icon: '👥'}, 
        {id: 'Actividades', icon: '🏆'}, 
        {id: 'Aulas', icon: '🏠'}, 
        {id: 'Alumnos', icon: '🎓'}, 
        {id: 'Horarios', icon: '🗓️'}
    ];

    if (userRole === 'tecnico') {
        tabs.push({id: 'Config', icon: '⚙️'});
    }

    tabs.forEach(tab => {
        const card = document.createElement('div');
        card.className = 'menu-card';
        card.onclick = function() { renderSection(tab.id); };
        card.innerHTML = `<div style="font-size:2.2rem">${tab.icon}</div><h3>${tab.id}</h3>`;
        menu.appendChild(card);
    });

    nav('scr-dash');
}

    function login() {
    userRole = document.getElementById('user-role').value;
    const monitorSelect = document.getElementById('id-monitor-login');
    monitorActivo = (userRole === 'monitor' && monitorSelect) ? monitorSelect.value : 'todos';

    const menu = document.getElementById('menu-container');
    if (!menu) return;
    menu.innerHTML = '';

    let tabs = [
        {id: 'Monitores', icon: '👥'}, 
        {id: 'Actividades', icon: '🏆'}, 
        {id: 'Aulas', icon: '🏠'}, 
        {id: 'Alumnos', icon: '🎓'}, 
        {id: 'Horarios', icon: '🗓️'}
    ];

    if (userRole === 'tecnico') {
        tabs.push({id: 'Config', icon: '⚙️'});
    }

    tabs.forEach(tab => {
        const card = document.createElement('div');
        card.className = 'menu-card';
        card.onclick = function() { renderSection(tab.id); };
        card.innerHTML = `<div style="font-size:2.2rem">${tab.icon}</div><h3>${tab.id}</h3>`;
        menu.appendChild(card);
    });

    nav('scr-dash');
}

    function logout() { nav('scr-inicio'); }

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        currentView = id;
        document.getElementById('btn-back-header').style.display = (id === 'scr-inicio') ? 'none' : 'flex';
    }

    function goBack() { 
        if(currentView === 'scr-edit') nav('scr-dash');
        else if(currentView === 'scr-dash') nav('scr-inicio');
    }

    function toggleFS() { 
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e => console.log(e));
        else document.exitFullscreen();
    }

    function renderSection(sec) {
    currentSection = sec;
    const container = document.getElementById('data-container');
    const actions = document.getElementById('section-actions');
    document.getElementById('global-search').value = '';
    container.innerHTML = ""; 
    actions.innerHTML = "";

    // Si es Configuración, no mostramos buscador ni botón de añadir
    if (sec === 'Config') {
        document.getElementById('search-box-area').style.display = 'none';
        renderConfigView();
    } 
    else if (sec === 'Horarios') { 
        document.getElementById('search-box-area').style.display = 'none';
        renderHorarioView(); 
    } 
    else {
        if(userRole === 'tecnico') {
            actions.innerHTML = `<button class="btn-add-section" onclick="openFormAdd('${sec}')">+ Añadir ${sec}</button>`;
        }
        document.getElementById('search-box-area').style.display = 'block';
        filterCurrentData(); 
    }
    nav('scr-edit');
}

    function filterCurrentData() {
    if (currentSection === 'Horarios') return;
    const query = document.getElementById('global-search').value.toUpperCase();
    const container = document.getElementById('data-container');
    container.innerHTML = "";

    let itemsToRender = [];
    if (currentSection === 'Alumnos') {
        const uniqueAlumnos = {};
        db.Alumnos.forEach(al => {
            const cleanAlNome = (al.nome || "").trim().toUpperCase();
            if (!uniqueAlumnos[cleanAlNome]) {
                uniqueAlumnos[cleanAlNome] = { ...al, acts: [al.act] };
            } else if(!uniqueAlumnos[cleanAlNome].acts.includes(al.act)) {
                uniqueAlumnos[cleanAlNome].acts.push(al.act);
            }
        });
        itemsToRender = Object.values(uniqueAlumnos);
    } else {
        itemsToRender = db[currentSection] || [];
    }

    getSorted(itemsToRender).filter(item => (item.nome||"").toUpperCase().includes(query)).forEach(item => {
        const originalIdx = db[currentSection].findIndex(x => x.nome === item.nome);
        let html = `<div class="item-card" onclick="openDetail('${currentSection}', ${originalIdx})">
            <button class="btn-del-item" onclick="event.stopPropagation(); deleteItem('${currentSection}', ${originalIdx})">✕</button>
            <div class="item-header"><span>${item.nome}</span></div>`;
        
        if(currentSection === 'Monitores') {
            html += `<div style="font-size:0.85rem; color:#64748b; margin-top:8px;">Ficha del Monitor</div>`;
        } else if(currentSection === 'Actividades') {
            html += `<div style="margin-top:8px; font-size:0.85rem;">⏰ ${item.hora} (${item.dia}) | 👤 ${item.monitor}</div>
            <div class="btn-act-group">
                <button class="btn-act btn-asis" onclick="event.stopPropagation(); openAsistencia('${item.nome.replace(/'/g, "\\'")}')">Pasar Lista</button>
                <button class="btn-act btn-wapp" onclick="event.stopPropagation(); prepareWhatsApp('${item.nome.replace(/'/g, "\\'")}', '${item.dia}', '${item.hora}')">Aviso 💬</button>
            </div>`;
        } else if(currentSection === 'Alumnos') {
            const actsText = item.acts ? item.acts.join(', ') : item.act;
            html += `<div style="font-size:0.85rem; margin-top:5px; color:#64748b;">📚 ${actsText} <span class="status-badge status-${item.status || 'admitido'}">${item.status || 'admitido'}</span></div>`;
        }
        container.innerHTML += html + `</div>`;
    });
}

   // --- SISTEMA DE WHATSAPP V121 ---
// --- SISTEMA DE WHATSAPP MEJORADO ---
function prepareWhatsApp(actNome, dia, hora) {
    const cleanAct = actNome.trim().toUpperCase();
    const admitidos = db.Alumnos.filter(a => 
        (a.act || "").trim().toUpperCase() === cleanAct && 
        (a.status === 'admitido' || !a.status) &&
        (a.tlfs && a.tlfs.trim() !== "")
    );

    let html = `<h3>Aviso WhatsApp: ${actNome}</h3>`;
    
    if (admitidos.length === 0) {
        html += `<p style="color:#ef4444; padding:20px; text-align:center;">⚠️ No hay alumnos admitidos con teléfono.</p>`;
    } else {
        // Sección de Envío Rápido (Máximo 20)
        const lista20 = admitidos.slice(0, 20);
        html += `
        <div style="background:#e8f5e9; padding:15px; border-radius:12px; margin-bottom:20px; border:1px solid #25d366;">
            <p style="margin:0 0 10px 0; color:#1b5e20; font-weight:bold; font-size:0.9rem;">🚀 ENVÍO RÁPIDO (Primeros ${lista20.length})</p>
            <button class="btn" style="background:#128c7e; margin:0; width:100%;" onclick="sendMassiveWhatsApp('${actNome.replace(/'/g, "\\'")}', '${dia}', '${hora}')">
                MENSAJE GRUPAL 👥
            </button>
            <p style="font-size:0.7rem; color:#1b5e20; margin-top:8px;">* Selecciona a los destinatarios en el siguiente paso de WhatsApp.</p>
        </div>
        
        <p style="font-size:0.8rem; color:gray; font-weight:bold;">ENVIAR INDIVIDUALMENTE:</p>
        <div style="max-height: 250px; overflow-y: auto;">`;
        
        admitidos.forEach(al => {
            const numeros = al.tlfs.match(/[679]\d{8}/g); 
            if (numeros) {
                numeros.forEach(num => {
                    html += `
                    <button class="btn" style="background:#25d366; margin-bottom:8px; text-align:left; display:flex; align-items:center; justify-content:space-between; padding:12px; font-size:0.9rem; width:100%;" 
                        onclick="sendWhatsApp('${num}', '${actNome.replace(/'/g, "\\'")}', '${dia}', '${hora}')">
                        <span>📱 ${al.nome}</span>
                        <span>${num} ➔</span>
                    </button>`;
                });
            }
        });
        html += `</div>`;
    }
    
    html += `<button class="btn" onclick="closeModal()" style="margin-top:15px; background:#64748b; width:100%;">CANCELAR</button>`;
    
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('active');
}

function sendWhatsApp(phone, act, dia, hora) {
    const cleanPhone = phone.replace(/\D/g, '');
    const textoBase = `Hola, le escribimos desde el Concello de Melide sobre la actividad ${act}. Le recordamos su horario: ${dia} a las ${hora}.`;
    
    const nuevoMsg = prompt("Edita el mensaje individual:", textoBase);
    
    if (nuevoMsg !== null && nuevoMsg.trim() !== "") {
        const msgFinal = encodeURIComponent(nuevoMsg);
        // Creamos un enlace temporal y lo "pulsamos" por código para saltar el bloqueo
        const link = document.createElement('a');
        link.href = `https://wa.me/34${cleanPhone}?text=${msgFinal}`;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.click();
    }
}

function sendMassiveWhatsApp(act, dia, hora) {
    const textoBase = `Hola, le escribimos desde el Concello de Melide sobre la actividad ${act}. Le recordamos su horario: ${dia} a las ${hora}.`;
    
    const nuevoMsg = prompt("Escribe el mensaje para enviar a los admitidos:", textoBase);
    
    if (nuevoMsg !== null && nuevoMsg.trim() !== "") {
        const msgFinal = encodeURIComponent(nuevoMsg);
        
        // Usamos el mismo método de enlace simulado para mayor compatibilidad
        const link = document.createElement('a');
        link.href = `https://api.whatsapp.com/send?text=${msgFinal}`;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.click();
    }
}

    function openDetail(sec, idx) {
        if(sec === 'Monitores') openMonitorEdit(idx);
        else if(sec === 'Actividades') openActividadDetail(idx);
        else if(sec === 'Aulas') openAulaDetail(idx);
        else if(sec === 'Alumnos') openAlumnoDetail(idx);
    }

    function openActividadDetail(idx) {
        const act = db.Actividades[idx];
        const sortedMons = getSorted(db.Monitores);
        const sortedAulas = getSorted(db.Aulas);
        const cleanActNome = act.nome.trim().toUpperCase();
        
        const alumnos = db.Alumnos.filter(al => (al.act || "").trim().toUpperCase() === cleanActNome).sort((a,b) => {
            const order = { 'admitido': 1, 'espera': 2, 'baja': 3 };
            return (order[a.status] || 1) - (order[b.status] || 1);
        });

        let horaOptions = '<option value="">-- Seleccionar hora --</option>';
        for(let h=9; h<=23; h++) {
            let hStr = h.toString().padStart(2, '0') + ':00';
            horaOptions += `<option value="${hStr}" ${act.hora===hStr?'selected':''}>${hStr}</option>`;
        }

        document.getElementById('modal-body').innerHTML = `
            <label>Nombre de la Actividad</label>
            <input type="text" id="edit-act-name" value="${act.nome}" onchange="updateActName(${idx}, this.value)">
            <div style="background:#f8fafc; padding:15px; border-radius:15px; margin-top:15px; margin-bottom:15px;">
                <label>Monitor</label>
                <select onchange="updateActField(${idx}, 'monitor', this.value)">
                    <option value="SIN ASIGNAR">-- Sin asignar --</option>
                    ${sortedMons.map(m => `<option value="${m.nome}" ${act.monitor===m.nome?'selected':''}>${m.nome}</option>`).join('')}
                </select>
                <label>Aula / Local</label>
                <select id="sel-aula-act" onchange="updateActField(${idx}, 'aula', this.value)">
                    <option value="POR DEFINIR">-- Por definir --</option>
                    ${sortedAulas.map(a => {
                        let opts = `<option value="${a.nome}" ${act.aula===a.nome?'selected':''}>${a.nome}</option>`;
                        if(a.espacios) a.espacios.forEach(e => {
                            opts += `<option value="${e}" ${act.aula===e?'selected':''}>📍 ${e}</option>`;
                        });
                        return opts;

        if(confirm(`¿Eliminar definitivamente a ${nome}?`)) {
            const cleanActNome = db.Actividades[actIdx].nome.trim().toUpperCase();
            db.Alumnos = db.Alumnos.filter(a => !(a.nome === nome && (a.act || "").trim().toUpperCase() === cleanActNome));
            saveData();
            openActividadDetail(actIdx);
        }
    }

    function updateActName(idx, newName) {
        const oldName = db.Actividades[idx].nome.trim().toUpperCase();
        const cleanName = newName.trim().toUpperCase();
        if(!cleanName) return;
        db.Actividades[idx].nome = cleanName;
        db.Alumnos.forEach(al => { if((al.act || "").trim().toUpperCase() === oldName) al.act = cleanName; });
        saveData();
    }

        db.Actividades[idx][field] = (typeof val === 'string') ? val.trim().toUpperCase() : val;

    function vincularActDesdeAula(aulaNome, aulaIdx) {
        const actNome = document.getElementById('a-act-vinc')?.value || document.getElementById('loc-act')?.value;
        const cleanAct = (actNome || "").trim().toUpperCase();
        if(!cleanAct) return;

        let actLibre = db.Actividades.find(a => a.nome.trim().toUpperCase() === cleanAct && (a.aula === 'POR DEFINIR' || !a.aula));
        if(actLibre) {
            actLibre.aula = aulaNome.trim().toUpperCase();
        } else {
            const original = db.Actividades.find(a => a.nome.trim().toUpperCase() === cleanAct);
            if(original) {
                const copia = JSON.parse(JSON.stringify(original));
                copia.aula = aulaNome.trim().toUpperCase();
                db.Actividades.push(copia);
            }
        }
        saveData(); 
        if(db.Aulas[aulaIdx].nome === 'PARROQUIAS') openVincularLocal(aulaNome, aulaIdx); 
        else openAulaDetail(aulaIdx); 
    }

function updateHorarioFilter() {
    const filter = document.getElementById('h-filter')?.value || 'todo';
    const res = document.getElementById('horario-resultado');
    const gen = document.getElementById('cuadrante-general');
    const colFiltro = document.getElementById('col-filtro');
    const layout = document.getElementById('horario-layout');

    if (!res || !gen || !layout) return;

    const aplicarEstiloCaja = (div, alto) => {
        div.style.width = "100%";
        div.style.height = alto;
        div.style.overflow = "auto";   
        div.style.background = "white";
        div.style.borderRadius = "8px";
        div.style.border = "3px solid #005696";
        div.style.boxSizing = "border-box";
    };

    if (filter !== 'todo') {
        // ACTIVAR DOBLE COLUMNA
        layout.style.gridTemplateColumns = "1fr 1fr";
        colFiltro.style.display = "block";
        aplicarEstiloCaja(res, "80vh"); // Tamaño igual al general
        aplicarEstiloCaja(gen, "80vh");
    } else {
        // SOLO GENERAL
        layout.style.gridTemplateColumns = "1fr";
        colFiltro.style.display = "none";
        aplicarEstiloCaja(gen, "80vh");
    }

    const horasVisuales = ["09:00", "10:00", "11:00", "12:00", "16:00", "17:00", "18:00", "19:00", "20:00", "21:00"];
    const diasPrincipales = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes"];

    const generarTabla = (listaActividades, titulo, color) => {
        let html = `<div style="background:${color}; color:white; padding:10px; font-weight:bold; font-size:13px; text-align:center; position:sticky; top:0; left:0; z-index:25;">${titulo}</div>`;
        
        // El min-width de 600px asegura que no se rompan las celdas de 100px de alto
        html += `<table style="width:100%; min-width:600px; border-collapse:collapse; background:white; color:black; table-layout: fixed;">
            <thead>
                <tr style="background:#f1f5f9; color:#005696; position:sticky; top:33px; z-index:24;">
                    <th style="width:60px; padding:6px; border:1px solid #ddd; font-size:10px; position:sticky; left:0; background:#f1f5f9; z-index:26;">HORA</th>`;
        diasPrincipales.forEach(d => html += `<th style="width:108px; padding:6px; border:1px solid #ddd; font-size:10px;">${d.toUpperCase()}</th>`);
        html += `</tr></thead><tbody>`;

        horasVisuales.forEach(h => {
            html += `<tr>
                <td style="font-weight:bold; background:#f8fafc; color:#005696; text-align:center; border:1px solid #ddd; font-size:11px; padding:0; height:100px; position:sticky; left:0; z-index:23;">${h}</td>`;
            
            diasPrincipales.forEach(d => {
                const items = listaActividades.filter(ac => {
                    if (!ac || !ac.nome) return false;
                    const coincideDia = ac.dia === d || (ac.dia && ac.dia.includes(d));
                    const coincideHora = ac.hora && ac.hora.startsWith(h.substring(0,2));
                    return coincideDia && coincideHora;
                });

                html += `<td style="vertical-align:top; border:1px solid #ddd; padding:3px; height:100px;">`;
                items.forEach(i => {
                    html += `
                    <div onclick="goToActivity(${i.originalIndex})" 
                         style="background:#0ea5e9; color:white; padding:4px; border-radius:5px; font-size:9px; cursor:pointer; line-height:1.1; border:1px solid #0284c7; margin-bottom:3px; overflow:hidden; min-height:30px;">
                        <div style="font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${i.nome}</div>
                        <div style="font-size:8px; opacity:0.9;">${i.aula}</div>
                    </div>`;
                });
                html += `</td>`;
            });
            html += `</tr>`;
        });
        return html + `</tbody></table>`;
    };

    let dataConIndex = db.Actividades.map((a, idx) => ({...a, originalIndex: idx}))
                        .filter(a => a.aula && a.aula !== 'POR DEFINIR');

    gen.innerHTML = generarTabla(dataConIndex, "CUADRANTE GENERAL", "#475569");

    if (filter !== 'todo') {
        const parts = filter.split(':');
        const val = (parts[1] || "").trim().toUpperCase();
        let filtrados = dataConIndex.filter(a => {
            if (parts[0] === 'm') return (a.monitor || "").trim().toUpperCase() === val;
            if (parts[0] === 'l') return (a.aula || "").trim().toUpperCase() === val;
            return false;
        });
        res.innerHTML = generarTabla(filtrados, "VISTA FILTRADA", "#005696");
    }
}

            }
        }, 150);
    }
}

function openAsistencia(actNome) {

    // Obtenemos todos los alumnos de esta actividad
    const todos = db.Alumnos.filter(a => (a.act || "").trim().toUpperCase() === cleanAct);
    
    // Los separamos por grupos
    const admitidos = todos.filter(a => a.status === 'admitido' || !a.status);
    const espera = todos.filter(a => a.status === 'espera');
    const baja = todos.filter(a => a.status === 'baja');

    const hoy = new Date().toLocaleDateString();
    let html = `<h3>Lista: ${actNome}</h3><p style="margin-top:-10px; color:gray;">${hoy}</p>`;

    html += `<div style="margin-top:15px; border-left:4px solid #2563eb; padding-left:10px; font-weight:bold; color:#2563eb;">ADMITIDOS</div>`;
    if(admitidos.length === 0) {
        html += `<p style="color:gray; padding:10px; font-size:0.9rem;">No hay alumnos admitidos.</p>`;
    } else {
        admitidos.forEach(al => {
            html += `

                <span style="font-weight: 500;">${al.nome}</span>
                <span class="status-badge" style="background:#f1f5f9; color:#64748b; font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; font-weight: bold;">PENDIENTE</span>
            </div>`;
        });
    }

    // SECCIÓN 2: LISTA DE ESPERA (Solo lectura)
    if(espera.length > 0) {
        html += `<div style="margin-top:20px; border-left:4px solid #ca8a04; padding-left:10px; font-weight:bold; color:#ca8a04;">LISTA DE ESPERA</div>`;
        espera.forEach(al => {
            html += `<div style="padding:10px; border-bottom:1px solid #fef9c3; color:#854d0e; font-size:0.9rem;">• ${al.nome}</div>`;
        });
    }

    // SECCIÓN 3: BAJAS (Solo lectura)
    if(baja.length > 0) {
        html += `<div style="margin-top:20px; border-left:4px solid #dc2626; padding-left:10px; font-weight:bold; color:#dc2626;">BAJAS</div>`;

function toggleAsisRow(el) {
    const badge = el.querySelector('.status-badge');
    const estados = [
        { txt: 'PENDIENTE', bg: '#f1f5f9', col: '#64748b' },
        { txt: 'PRESENTE', bg: '#dcfce7', col: '#166534' },
        { txt: 'AUSENTE', bg: '#fee2e2', col: '#991b1b' }
    ];
    
    let actualIdx = estados.findIndex(e => e.txt === badge.innerText);
    let sig = estados[(actualIdx + 1) % estados.length];
    
    badge.innerText = sig.txt;
    badge.style.background = sig.bg;
    badge.style.color = sig.col;
}
// --- FIN SISTEMA ASISTENCIA ---
    function toggleAsis(alNome, fecha, act) {
        const cleanAct = act.trim().toUpperCase();
        const cleanAl = alNome.trim().toUpperCase();
        const al = db.Alumnos.find(a => a.nome.trim().toUpperCase() === cleanAl && (a.act || "").trim().toUpperCase() === cleanAct);
        if(al) {
            if(!al.asistencias) al.asistencias = {};
            const cur = al.asistencias[fecha];
            al.asistencias[fecha] = cur === 'presente' ? 'falta' : (cur === 'falta' ? 'pendiente' : 'presente');
            saveData(); openAsistencia(act);
        }
    }

   function openAlumnoDetail(idx) {
    const al = db.Alumnos[idx];
    const cleanNome = al.nome.trim().toUpperCase();
    const misActs = db.Alumnos.filter(a => a.nome.trim().toUpperCase() === cleanNome).map(a => a.act);
    
    let tlfsArray = al.tlfs ? al.tlfs.split('|').filter(t => t.trim() !== "") : [""];
    if (tlfsArray.length === 0) tlfsArray = [""];

    let html = `<h3>Ficha: ${al.nome}</h3>
        <p style="font-size:0.9rem; color:#64748b; margin-bottom:15px;"><strong>Inscrito en:</strong> ${misActs.join(', ')}</p>
        
        <label>Listado de Teléfonos / Contactos</label>
        <div id="tlf-container">`;
    
    tlfsArray.forEach((t, i) => {
        html += `
        <div style="display:flex; gap:5px; margin-bottom:8px;">
            <input type="text" class="alumno-tlf-input" value="${t}" placeholder="Ej: 600000000 (Padre)">
            <button onclick="this.parentElement.remove()" style="background:#fee2e2; color:#ef4444; border:none; border-radius:8px; padding:0 12px; cursor:pointer;">✕</button>
        </div>`;
    });

    html += `</div>
        <button class="btn" style="background:#0ea5e9; margin-top:5px; padding:10px; font-size:0.8rem; width:100%;" onclick="addTlfField()">+ AÑADIR OTRO TELÉFONO</button>
        
        <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
        <button class="btn" onclick="saveAlumnoTlfs('${al.nome.replace(/'/g, "\\'")}')">GUARDAR CAMBIOS</button>
        <button class="btn" style="background:#64748b; width:100%;" onclick="closeModal()">CANCELAR</button>`;
    
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('active');
}

// --- NUEVAS FUNCIONES DE CONTROL DE TELÉFONOS ---

function addTlfField() {
    const container = document.getElementById('tlf-container');
    const div = document.createElement('div');
    div.style = "display:flex; gap:5px; margin-bottom:8px;";
    div.innerHTML = `
        <input type="text" class="alumno-tlf-input" value="" placeholder="Nuevo teléfono..." style="flex:1;">
        <button onclick="this.parentElement.remove()" style="background:#fee2e2; color:#ef4444; border:none; border-radius:8px; padding:0 12px; cursor:pointer; font-weight:bold;">✕</button>
    `;
    container.appendChild(div);
}

function saveAlumnoTlfs(nome) {
    const cleanNome = nome.trim().toUpperCase();
    const inputs = document.querySelectorAll('.alumno-tlf-input');
    
    // Unimos todos los teléfonos con el separador |
    const tlfsNuevos = Array.from(inputs)
        .map(i => i.value.trim())
        .filter(t => t !== "")
        .join('|'); 

    // Buscamos al alumno en todas sus inscripciones (actividades) para actualizarlo
    db.Alumnos.forEach(a => {
        if (a.nome.trim().toUpperCase() === cleanNome) {
            a.tlfs = tlfsNuevos;
        }
    });

    saveData();         // Guarda en la base de datos local
    closeModal();       // Cierra la ficha
    filterCurrentData(); // Refresca la lista de alumnos en pantalla
    alert("Datos de contacto actualizados correctamente");
}

    function updateAlumnoStatus(nome, status, actIdx) {
        const cleanNome = nome.trim().toUpperCase();
        const cleanAct = actIdx !== null ? db.Actividades[actIdx].nome.trim().toUpperCase() : null;
        const al = db.Alumnos.find(a => a.nome.trim().toUpperCase() === cleanNome && (cleanAct ? (a.act || "").trim().toUpperCase() === cleanAct : true));
        if(al) { al.status = status; saveData(); if(actIdx !== null) openActividadDetail(actIdx); }
    }

    function openFormAdd(tipo) {
        document.getElementById('modal-body').innerHTML = `<h3>Añadir ${tipo}</h3><textarea id="bulk-names" rows="6" placeholder="Un nombre por línea..."></textarea><button class="btn" onclick="processAdd('${tipo}')">GUARDAR</button>`;
        document.getElementById('modal-overlay').classList.add('active');
    }

    function processAdd(tipo) {
        document.getElementById('bulk-names').value.split('\n').forEach(l => {
            const n = l.trim().toUpperCase();
            if(n) {
                if(tipo==='Monitores') db.Monitores.push({nome:n, apellidos:'', tlf:'', email:''});
                else if(tipo==='Aulas') db.Aulas.push({nome:n, espacios:[]});
                else if(tipo==='Actividades') db.Actividades.push({nome:n, monitor:'SIN ASIGNAR', aula:'POR DEFINIR', hora:'10:00', dia:'Lunes'});
                else if(tipo==='Alumnos') db.Alumnos.push({nome:n, act:'SIN ASIGNAR', status:'admitido', asistencias:{}, tlfs:''});
            }
        });
        saveData(); closeModal();
    }

    function bulkAdd(actNome, idx) {
        const cleanActNome = actNome.trim().toUpperCase();
        document.getElementById('bulk-al').value.split('\n').forEach(n => { 
            const nomeLimpio = n.trim().toUpperCase();
            if(nomeLimpio) db.Alumnos.push({ nome: nomeLimpio, act: cleanActNome, status: 'admitido', asistencias: {}, tlfs:'' }); 
        });
        saveData(); openActividadDetail(idx);
    }

    function deleteItem(sec, idx) { if(confirm('¿Borrar?')) { db[sec].splice(idx,1); saveData(); filterCurrentData(); } }
    
    function addParroquiasEspacios(idx) {
        const a = db.Aulas[idx]; if(!a.espacios) a.espacios = [];
        document.getElementById('bulk-parroquias').value.split('\n').forEach(val => { 
            const cleanVal = val.trim().toUpperCase();
            if(cleanVal && !a.espacios.includes(cleanVal)) a.espacios.push(cleanVal); 
        });
        saveData(); renderParroquiasView(idx);
    }
    
    function deleteLocal(nome, idxAula) {
        if(confirm(`¿Borrar local ${nome}?`)) { 
            db.Aulas[idxAula].espacios = db.Aulas[idxAula].espacios.filter(e => e !== nome); 
            saveData(); renderParroquiasView(idxAula); 
        }
    }

    function removeFromSched(actNome, aulaIdx) {
        const cleanAct = actNome.trim().toUpperCase();
        const act = db.Actividades.find(a => (a.nome || "").trim().toUpperCase() === cleanAct);
        if(act) { act.aula = 'POR DEFINIR'; saveData(); if(db.Aulas[aulaIdx].nome === 'PARROQUIAS') renderParroquiasView(aulaIdx); else openAulaDetail(aulaIdx); }
    }

    function unassignAct(actNome, idx) {
        const cleanAct = actNome.trim().toUpperCase();
        const act = db.Actividades.find(a => (a.nome || "").trim().toUpperCase() === cleanAct);
        if(act) { act.monitor = 'SIN ASIGNAR'; saveData(); openMonitorEdit(idx); }
    }
function renderConfigView() {
    const container = document.getElementById('data-container');
    container.innerHTML = `
        <div class="card" style="padding:20px; text-align:center; max-width:500px; margin: 0 auto;">
            <h2 style="color:var(--melide-primary); margin-top:0;">Copia de Seguridad</h2>
            <p style="color:#475569; font-size:14px; margin-bottom:20px;">
                Usa estas opciones para mover tus datos entre dispositivos (PC, Móvil o Tablet).
            </p>
            <div style="display:flex; flex-direction:column; gap:15px;">
                <button onclick="exportarDatos()" style="background:#10b981; color:white; padding:15px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; font-size:16px;">
                    📥 EXPORTAR DATOS (.json)
                </button>
                <div style="border:2px dashed #cbd5e1; padding:20px; border-radius:10px; background:#f8fafc;">
                    <label style="display:block; margin-bottom:10px; font-weight:bold; color:var(--text-main);">IMPORTAR ARCHIVO:</label>
                    <input type="file" id="importFile" accept=".json" onchange="importarDatos(event)" style="font-size:12px; width:100%;">
                </div>
            </div>
            <hr style="margin:30px 0; border:0; border-top:1px solid #e2e8f0;">
            <button onclick="if(confirm('¿BORRAR TODO?')){localStorage.clear(); location.reload();}" 
                    style="background:#ef4444; color:white; padding:10px; border:none; border-radius:8px; font-size:12px; opacity:0.6; cursor:pointer;">
                Borrar base de datos local
            </button>
        </div>
    `;
}
function exportarDatos() {
    const dataStr = JSON.stringify(db, null, 2);
    const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
    const nombreArchivo = 'backup_escolas_' + new Date().toISOString().slice(0,10) + '.json';
    let linkElement = document.createElement('a');
    linkElement.setAttribute('href', dataUri);
    linkElement.setAttribute('download', nombreArchivo);
    linkElement.click();
}

function importarDatos(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            let contenido = e.target.result;
            contenido = contenido.replace(/^\uFEFF/, ""); 
            const datos = JSON.parse(contenido);

            if (datos && typeof datos === 'object') {
                if (confirm('¿Cargar estos datos?')) {
                    
                    // RECONSTRUCCIÓN ESTRUCTURADA (Para evitar que se bloquee la interfaz)
                    // Si alguna sección falta en el JSON, la creamos vacía []
                    db = {
                        Alumnos: Array.isArray(datos.Alumnos) ? datos.Alumnos : [],
                        Monitores: Array.isArray(datos.Monitores) ? datos.Monitores : [],
                        Actividades: Array.isArray(datos.Actividades) ? datos.Actividades : [],
                        Aulas: Array.isArray(datos.Aulas) ? datos.Aulas : [
                            { nome: 'PABELLÓN MUNICIPAL', espacios: ['PISTA CENTRAL', 'SALA 1', 'SALA 2'] },
                            { nome: 'PISCINA MUNICIPAL', espacios: ['VASO GRANDE', 'VASO PEQUEÑO', 'SALA FITNESS'] },
                            { nome: 'PARROQUIAS', espacios: [] }
                        ]
                    };

                    // Procesamos los teléfonos como hacías antes
                    db.Alumnos.forEach(al => {
                        if (al.phoneList && Array.isArray(al.phoneList)) al.tlfs = al.phoneList.join(' | ');
                        if (al.tlfs === undefined) al.tlfs = "";
                    });

                    // GUARDADO Y RECARGA
                    saveData();
                    alert('¡IMPORTACIÓN CORRECTA! Se reiniciará la página para aplicar los cambios.');
                    location.reload();
                }
            }
        } catch (err) {
            console.error("Error detallado:", err);
            alert('ERROR: El archivo JSON tiene un formato que el programa no puede leer.');
        }
    };
    reader.readAsText(file);
}
    // --- FORZAR CONEXIÓN FIREBASE AL FINAL DEL ARCHIVO ---
if (typeof firebase !== 'undefined') {
    const firebaseConfig = {
        databaseURL: "https://escolas-melide-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    window.dbRef = firebase.database().ref('melide_db');

    // Creamos la función de guardado universal
    window.saveData = function() {
        localStorage.setItem('melide_db', JSON.stringify(db));
        if (window.dbRef) {
            window.dbRef.set(db);
            console.log("Sincronizado con Firebase con éxito");
        }
    };

    // Escuchamos la nube para actualizar el PC/Móvil
    window.dbRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            db = data;
            if (typeof renderAll === 'function') renderAll();
        }
    });
}
